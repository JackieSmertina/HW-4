<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form">
        <h1 class="form-title">Регистрация</h1>
        
        <form class="form-body" action="#" method="post">
            
            <div class="form-group">
                <label class="form-label">Имя</label>
                <input class="form-input" type="text" name="name" placeholder="Введите имя" required>
            </div>

            <div class="form-group">
                <label class="form-label">Email</label>
                <input class="form-input" type="email" name="email" placeholder="Email" required>
            </div>

            <div class="form-group">
                <label class="form-label">Пароль</label>
                <input class="form-input" type="password" name="password" placeholder="Пароль" required>
            </div>

            <div class="form-group">
                <label class="form-label">Возраст</label>
                <input class="form-input" type="number" name="age" placeholder="Возраст" required>
            </div>

            <div class="form-group">
                <label class="form-label">Пол</label>
                <input type="radio" name="gender" value="male" required> Мужской
                <input type="radio" name="gender" value="female" required> Женский
            </div>

            <div class="form-group">
                <input type="checkbox" name="terms" required> Согласен с условиями
            </div>

            <div class="form-group">
                <label class="form-label">Город</label>
                <select class="form-select" name="city" required>
                    <option value="">Выберите город</option>
                    <option value="moscow">Москва</option>
                    <option value="spb">Санкт-Петербург</option>
                    <option value="kazan">Казань</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">О себе</label>
                <textarea class="form-textarea" name="about" rows="4"></textarea>
            </div>

            <button class="form-button" type="submit">Зарегистрироваться</button>
            
        </form>
    </div>
</body>
</html>
